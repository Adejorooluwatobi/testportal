<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — AWEDI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<div id="page-signin" class="page active">
  <div class="signin-wrap">
    <div class="signin-card">
      <div class="org-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3.5c1.24 0 2.25 1.01 2.25 2.25S13.24 10 12 10 9.75 8.99 9.75 7.75 10.76 5.5 12 5.5zM12 18c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08C16.71 16.72 14.5 18 12 18z"/></svg>
      </div>
      <div class="org-name">AWEDI</div>
      <div class="org-tag">NGO Admin Management Portal</div>
      <div class="si-group">
        <label class="si-label">Email Address</label>
        <input class="si-input" type="email" placeholder="admin@hopeforward.org" value="admin@hopeforward.org"/>
      </div>
      <div class="si-group">
        <label class="si-label">Password</label>
        <input class="si-input" type="password" placeholder="••••••••" value="password"/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--muted);"><input type="checkbox" checked style="accent-color:var(--accent);"/>Remember me</label>
        <span style="color:var(--accent);cursor:pointer;font-weight:600;">Forgot password?</span>
      </div>
      <button class="btn-signin" id="signin-btn" onclick="doSignIn()">Sign In to Portal</button>
      <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--muted);">AWEDI NGO &nbsp;·&nbsp; Secure Admin Access &nbsp;·&nbsp; SSL Encrypted</p>
    </div>
  </div>
</div>

<script src="js/scripts.js"></script>
</body>
</html>
