<div class="page-header">
  <div class="breadcrumb">
    <a routerLink="/admin/list">Admins</a>
    <span class="breadcrumb-sep">/</span>
    <span>Edit Admin</span>
  </div>
  <h2>Update Administrator</h2>
  <p>Modify account details and access roles for this admin.</p>
</div>

<div *ngIf="isLoading" class="skeleton-wrap">
  <div class="card skeleton h-48"></div>
</div>

<div class="card max-w-2xl" *ngIf="!isLoading">
  <div class="card-pad border-b border-border">
    <h3 class="card-title">Edit Account Details</h3>
  </div>
  <form [formGroup]="adminForm" (ngSubmit)="onSubmit()" class="card-pad">
    <div class="form-grid">
      <div class="fg full">
        <label class="fl">Username</label>
        <input type="text" class="fi" formControlName="username">
      </div>
      <div class="fg full">
        <label class="fl">Email Address</label>
        <input type="email" class="fi" formControlName="email">
      </div>
      <div class="fg full">
        <label class="fl">Access Role</label>
        <select class="fi" formControlName="role">
          <option value="super_admin">Super Admin</option>
          <option value="technical">Technical</option>
          <option value="operator">Operator</option>
        </select>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8">
      <a routerLink="/admin/list" class="btn-ol">Cancel</a>
      <button type="submit" class="btn-primary" [disabled]="adminForm.invalid || isLoading">
        {{ isLoading ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
